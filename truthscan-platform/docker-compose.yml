version: "3.9"

services:
  # ── TruthScan API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: truthscan-backend:latest
    container_name: truthscan_api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - GOOGLE_FACT_CHECK_API_KEY=${GOOGLE_FACT_CHECK_API_KEY}
      - VECTOR_DB_PROVIDER=chroma
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
      - ENV=production
    volumes:
      - model_data:/app/models
      - chroma_data:/app/data/chroma_db
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - truthscan_net

  # ── Redis Cache ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: truthscan_redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - truthscan_net

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: truthscan_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/var/www/frontend:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - truthscan_net

volumes:
  model_data:
  chroma_data:
  redis_data:

networks:
  truthscan_net:
    driver: bridge
